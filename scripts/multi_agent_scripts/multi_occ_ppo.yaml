behaviors:
  DroneAgent:
    trainer_type: ppo

    hyperparameters:
      batch_size: 2048
      buffer_size: 81920
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 5
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 3

    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.01

    max_steps: 2000000          # ~22 hrs at 25 steps/sec — realistic for your machine
    time_horizon: 2048
    summary_freq: 10000
    checkpoint_interval: 50000
    keep_checkpoints: 10
    threaded: true

environment_parameters:

  target_distance:
    curriculum:
      - name: hover_training
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 20     # ~2 min at 25 steps/sec
          signal_smoothing: true
          threshold: 12.0
        value: 0.0

      - name: close_target
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 20     # ~3.3 min
          signal_smoothing: true
          threshold: 20.0
        value: 5.0

      - name: medium_target
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 20
          signal_smoothing: true
          threshold: 28.0
        value: 15.0

      - name: static_obstacles
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 20     # ~5.3 min
          signal_smoothing: true
          threshold: 28.0
        value: 15.0

      - name: complex_obstacles
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 20
          signal_smoothing: true
          threshold: 30.0
        value: 20.0

      - name: mid_distance
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 20    # ~6.7 min
          signal_smoothing: true
          threshold: 35.0
        value: 35.0

      - name: long_distance
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 20
          signal_smoothing: true
          threshold: 40.0
        value: 50.0

      - name: expert_flight
        value: 60.0

  obstacle_count:
    curriculum:
      - name: hover_training
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 20
          signal_smoothing: true
          threshold: 12.0
        value: 0

      - name: close_target
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 20
          signal_smoothing: true
          threshold: 20.0
        value: 0

      - name: medium_target
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 20
          signal_smoothing: true
          threshold: 28.0
        value: 0

      - name: static_obstacles
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 20
          signal_smoothing: true
          threshold: 28.0
        value: 3

      - name: complex_obstacles
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 20
          signal_smoothing: true
          threshold: 30.0
        value: 6

      - name: mid_distance
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 20
          signal_smoothing: true
          threshold: 35.0
        value: 8

      - name: long_distance
        completion_criteria:
          measure: reward
          behavior: DroneAgent
