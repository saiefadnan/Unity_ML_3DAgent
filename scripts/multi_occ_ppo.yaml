behaviors:
  DroneAgent:
    trainer_type: ppo

    hyperparameters:
      batch_size: 1024 
      buffer_size: 40960 # Increased to handle data from multiple agents without updating mid-episode
      learning_rate: 0.0003
      beta: 0.005 # Stays low for precision Angle Mode flying
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true # Normalizes raycasts and velocity vectors automatically
      hidden_units: 512 # Increased brain capacity for teammate tracking
      num_layers: 3 # Deeper network for complex social dynamics
      # NO vis_encode_type (Removed Resnet)
      # NO memory block (Removed LSTM)

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.01

    max_steps: 50000000
    time_horizon: 1024
    summary_freq: 10000

environment_parameters:
  target_distance:
    curriculum:
      - name: hover_training
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 20
          signal_smoothing: true
          threshold: 8.0
        value: 0.0

      - name: close_target
