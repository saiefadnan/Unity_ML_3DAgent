behaviors:
  DroneAgent:
    trainer_type: sac
    hyperparameters:
      learning_rate: 0.0003
      learning_rate_schedule: constant
      batch_size: 256
      buffer_size: 50000
      tau: 0.005
      steps_per_update: 1
      save_replay_buffer: false
      init_entcoef: 0.5
      reward_signal_steps_per_update: 1
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: nature_cnn
      memory:
        use_recurrent: true
        sequence_length: 128
        memory_size: 256
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.005
        network_settings:
          encoding_size: 256
    max_steps: 50000000
    time_horizon: 1024
    summary_freq: 10000

environment_parameters:
  target_distance:
    curriculum:
      - name: hover_training
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 600.0
        value: 0.0
      - name: close_target
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 15.0
