# 3D Drone Training Curriculum
# Progressive difficulty system for ML-Agents training
#
# CURRICULUM DESIGN:
#   - target_distance is the DRIVER: it owns all completion_criteria.
#   - obstacle_count and wind_strength are FOLLOWERS: they mirror the same
#     completion_criteria as target_distance so ML-Agents advances them in lockstep.
#
# Stages at a glance:
#   hover_training   → distance=0,  obstacles=0,  wind=0
#   close_target     → distance=5,  obstacles=0,  wind=0
#   medium_target    → distance=10, obstacles=0,  wind=0
#   static_obstacles → distance=10, obstacles=3,  wind=0
#   complex_obstacles→ distance=15, obstacles=6,  wind=0
#   wind_challenge   → distance=15, obstacles=6,  wind=2
#   long_distance    → distance=75, obstacles=12, wind=3
#   expert_flight    → distance=80, obstacles=15, wind=5

behaviors:
  DroneAgent:
    trainer_type: ppo

    hyperparameters:
      batch_size: 512
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.02
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
      memory:
        use_recurrent: true
        sequence_length: 64
        memory_size: 256

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.005
        network_settings:
          encoding_size: 256

    max_steps: 10000000
    time_horizon: 512
    summary_freq: 10000

environment_parameters:
  # ── DRIVER ─────────────────────────────────────────────────────────────────
  target_distance:
    curriculum:
      - name: hover_training
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 5.0
        value: 0.0

      - name: close_target
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 10.0
        value: 5.0

      - name: medium_target
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 15.0
        value: 10.0

      - name: static_obstacles
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 12.0
        value: 10.0

      - name: complex_obstacles
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 12.0
        value: 15.0

      - name: wind_challenge
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 10.0
        value: 15.0

      - name: long_distance
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 15.0
        value: 75.0

      - name: expert_flight
        value: 80.0

  # ── FOLLOWERS — mirror driver's completion_criteria exactly ────────────────
  obstacle_count:
    curriculum:
      - name: hover_training
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 5.0
        value: 0

      - name: close_target
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 10.0
        value: 0

      - name: medium_target
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 15.0
        value: 0

      - name: static_obstacles
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 12.0
        value: 3

      - name: complex_obstacles
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 12.0
        value: 6

      - name: wind_challenge
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 10.0
        value: 6

      - name: long_distance
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 15.0
        value: 12

      - name: expert_flight
        value: 15

  wind_strength:
    curriculum:
      - name: hover_training
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 5.0
        value: 0.0

      - name: close_target
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 10.0
        value: 0.0

      - name: medium_target
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 15.0
        value: 0.0

      - name: static_obstacles
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 12.0
        value: 0.0

      - name: complex_obstacles
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 12.0
        value: 0.0

      - name: wind_challenge
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 10.0
        value: 2.0

      - name: long_distance
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 15.0
        value: 3.0

      - name: expert_flight
        value: 5.0