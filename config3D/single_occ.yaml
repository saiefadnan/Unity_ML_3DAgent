# 3D Drone Training Curriculum
# Progressive difficulty system for ML-Agents training
#
# CURRICULUM DESIGN:
#   - target_distance is the DRIVER: it owns all completion_criteria.
#   - obstacle_count and wind_strength are FOLLOWERS: they only declare values,
#     so they advance in lockstep with target_distance automatically.
#
# Stages at a glance:
#   hover_training   → distance=0,  obstacles=0,  wind=0
#   close_target     → distance=5,  obstacles=0,  wind=0
#   medium_target    → distance=10, obstacles=0,  wind=0
#   static_obstacles → distance=10, obstacles=3,  wind=0
#   complex_obstacles→ distance=15, obstacles=6,  wind=0
#   wind_challenge   → distance=15, obstacles=6,  wind=2
#   long_distance    → distance=75, obstacles=12, wind=3
#   expert_flight    → distance=80, obstacles=15, wind=5

behaviors:
  DroneAgent:
    trainer_type: ppo

    hyperparameters:
      batch_size: 512           # Reduced from 2048 — camera tensors are large
      buffer_size: 10240        # Reduced from 40960 — saves VRAM with visual input
      learning_rate: 0.0003
      beta: 0.02                # Higher entropy early — encourages exploration in hover stage
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true           # Critical for continuous obs like velocity/position
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple   # REQUIRED for camera input — enables CNN encoder
                                # Use 'resnet' for complex scenes (slower to train)
      # LSTM enabled — obstacles can block line-of-sight to target, creating partial
      # observability. Memory lets the agent retain where it last saw the target and
      # build a mental map of obstacle positions across time.
      memory:
        use_recurrent: true
        sequence_length: 64     # How many steps the agent can look back (~1 sec at 60fps)
        memory_size: 256        # Must be even number, match hidden_units

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.005         # Reduced from 0.01 — curiosity is slower with camera input
        encoding_size: 256      # Matches hidden_units

    max_steps: 10000000
    time_horizon: 512           # ≥ 8× sequence_length (64) — gives LSTM enough context per rollout
    summary_freq: 10000

# ==============================================================================
# CURRICULUM: target_distance is the DRIVER — owns all completion_criteria.
#             obstacle_count and wind_strength are FOLLOWERS — values only.
# ==============================================================================

environment_parameters:
  # ── DRIVER ─────────────────────────────────────────────────────────────────
  target_distance:
    curriculum:
      - name: hover_training
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 5.0
        value: 0.0

      - name: close_target
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 10.0
        value: 5.0

      - name: medium_target
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 15.0
        value: 10.0

      - name: static_obstacles
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 12.0
        value: 10.0

      - name: complex_obstacles
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 12.0
        value: 15.0

      - name: wind_challenge
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 10.0
        value: 15.0

      - name: long_distance
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          min_lesson_length: 100
          signal_smoothing: true
          threshold: 15.0
        value: 75.0

      - name: expert_flight
        value: 80.0             # Final stage — no completion_criteria needed

  # ── FOLLOWERS (values only, advance with target_distance) ──────────────────
  obstacle_count:
    curriculum:
      - name: hover_training
        value: 0
      - name: close_target
        value: 0
      - name: medium_target
        value: 0
      - name: static_obstacles
        value: 3
      - name: complex_obstacles
        value: 6
      - name: wind_challenge
        value: 6
      - name: long_distance
        value: 12
      - name: expert_flight
        value: 15

  wind_strength:
    curriculum:
      - name: hover_training
        value: 0.0
      - name: close_target
        value: 0.0
      - name: medium_target
        value: 0.0
      - name: static_obstacles
        value: 0.0
      - name: complex_obstacles
        value: 0.0
      - name: wind_challenge
        value: 2.0
      - name: long_distance
        value: 3.0
      - name: expert_flight
        value: 5.0